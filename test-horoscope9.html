<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iztro 紫微斗数 · 本命盘与运限流耀叠加</title>
<script src="./dist/iztro.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; font-size: 22px; }
.container { max-width: 1300px; margin: 0 auto; }

.panel { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 13px; color: #666; }
.field input, .field select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; min-width: 130px; }
.field input:focus, .field select:focus { outline: none; border-color: #4a90d9; }
button { padding: 8px 24px; background: #4a90d9; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
button:hover { background: #357abd; }
button.secondary { background: #666; }
button.secondary:hover { background: #555; }
button.small { padding: 4px 12px; font-size: 12px; }
button.scope-on { background: #e67e22; color: #fff; }
#error { color: #e74c3c; padding: 8px 0; }

.scope-group { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

/* 4x4 紫微斗数星盘布局 */
.astro-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  max-width: 860px;
  margin: 0 auto;
  aspect-ratio: 1;
  border: 1px solid #bbb;
  position: relative;
}
.palace-card {
  background: #fafafa;
  outline: 1px solid #bbb;
  margin: 0;
  padding: 3px;
  font-size: 10px;
  overflow: hidden;
  display: grid;
  grid-template-rows: 1fr auto auto auto;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px 0;
  position: relative;
}
.palace-card.empty { background: transparent; outline: none; pointer-events: none; }

/* ---------- 三方四正连线 SVG ---------- */
#sfzz-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

/* ---------- 星曜区（顶部，跨3列） ---------- */
.stars-area {
  grid-column: 1 / 4;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  align-content: flex-start;
  gap: 2px 4px;
  padding: 1px 0;
  min-height: 0;
}
.star-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.1;
  min-width: 14px;
}
.star-item .sn { font-size: 10px; font-weight: 600; writing-mode: vertical-lr; letter-spacing: 0; }
.star-item .sb { font-size: 8px; color: #888; line-height: 1; margin-top: 1px; }
.star-item .sm { font-size: 7px; color: #fff; background: #c0392b; border-radius: 2px; padding: 0 2px; line-height: 1.3; margin-top: 1px; }
.major { color: #c0392b; }
.soft { color: #27ae60; }
.tough { color: #e67e22; }
.adj { color: #7f8c8d; }
.star-type-label { font-size: 7px; color: #999; writing-mode: vertical-lr; letter-spacing: 1px; margin-right: 1px; }

/* ---------- 流耀区（右侧，竖排） ---------- */
.transit-area {
  position: absolute;
  right: 2px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: row-reverse;
  align-items: flex-start;
  gap: 2px;
  z-index: 1;
}
.ts-item { font-size: 8px; font-weight: 600; writing-mode: vertical-lr; letter-spacing: 0; line-height: 1.1; }
.ts-decadal { color: #c55a11; }
.ts-yearly  { color: #2e75b6; }
.ts-monthly { color: #548235; }
.ts-daily   { color: #bf8f00; }
.ts-hourly  { color: #843c0c; }

/* ---------- 大限区（第3行，居中） ---------- */
.decadal-area {
  grid-column: 1 / 4;
  text-align: center;
  font-size: 9px;
  color: #666;
  padding: 1px 0;
  border-top: 1px dotted #ddd;
  border-bottom: 1px dotted #ddd;
}

/* ---------- 底部三列 ---------- */
.deities-area {
  grid-column: 1;
  align-self: end;
  display: flex;
  flex-direction: column;
  font-size: 8px;
  color: #777;
  line-height: 1.3;
  padding: 1px;
  overflow: hidden;
}
.name-area {
  grid-column: 2;
  align-self: end;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: #c0392b;
  padding-bottom: 1px;
}
.body-mark {
  position: absolute;
  right: 2px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  color: #c0392b;
  background: #fff;
  border: 1px solid #c0392b;
  border-radius: 4px;
  font-weight: 600;
  writing-mode: vertical-lr;
  letter-spacing: 1px;
  line-height: 1.2;
  padding: 2px 1px;
}
.stem-area {
  grid-column: 3;
  align-self: end;
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  writing-mode: vertical-lr;
  line-height: 1;
  padding: 0;
  margin: 0 0 0 0;
  gap: 0;
}
.stem-area .cs12 { font-size: 8px; color: #888; line-height: 1; }
.stem-area .sb-text { font-size: 11px; color: #555; letter-spacing: 1px; line-height: 1; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
td, th { padding: 5px 8px; border: 1px solid #eee; text-align: left; }
th { background: #f0f0f0; font-weight: 600; }

#horoInfo { margin-bottom: 10px; }
.horo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 8px; }
.horo-card { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px; font-size: 12px; }
.horo-card .horo-label { color: #888; font-size: 11px; }
.horo-card .horo-value { font-weight: 600; margin-top: 2px; }
.hc-decadal { border-left: 3px solid #c55a11; }
.hc-yearly  { border-left: 3px solid #2e75b6; }
.hc-monthly { border-left: 3px solid #548235; }
.hc-daily   { border-left: 3px solid #bf8f00; }
.hc-hourly  { border-left: 3px solid #843c0c; }
</style>
</head>
<body>
<div class="container">
  <h1>iztro 紫微斗数 · 本命盘 + 运限流耀叠加</h1>

  <div class="panel">
    <div class="row">
      <div class="field"><label>日期</label><input id="dateStr" value="2000-8-16"></div>
      <div class="field">
        <label>时辰</label>
        <select id="timeIndex">
          <option value="0">早子时 00:00~01:00</option>
          <option value="1">丑时 01:00~03:00</option>
          <option value="2" selected>寅时 03:00~05:00</option>
          <option value="3">卯时 05:00~07:00</option>
          <option value="4">辰时 07:00~09:00</option>
          <option value="5">巳时 09:00~11:00</option>
          <option value="6">午时 11:00~13:00</option>
          <option value="7">未时 13:00~15:00</option>
          <option value="8">申时 15:00~17:00</option>
          <option value="9">酉时 17:00~19:00</option>
          <option value="10">戌时 19:00~21:00</option>
          <option value="11">亥时 21:00~23:00</option>
          <option value="12">晚子时 23:00~00:00</option>
        </select>
      </div>
      <div class="field"><label>性别</label><select id="gender"><option>男</option><option>女</option></select></div>
      <div class="field"><label>流派</label><select id="algorithm"><option value="default">全书派</option><option value="zhongzhou">中州派</option></select></div>
      <button id="btnCalc">排盘</button>
    </div>
    <div id="error"></div>
  </div>

  <!-- 运限控制区 -->
  <div class="panel" id="horoPanel" style="display:none;">
    <div class="row">
      <div class="field"><label>运限日期</label><input id="horoDate" value="2025-6-1"></div>
      <div class="field"><label>运限时辰</label><select id="horoTime"><option value="0">早子时</option><option value="1">丑时</option><option value="2">寅时</option><option value="3">卯时</option><option value="4">辰时</option><option value="5">巳时</option><option value="6">午时</option><option value="7">未时</option><option value="8">申时</option><option value="9">酉时</option><option value="10">戌时</option><option value="11">亥时</option><option value="12">晚子时</option></select></div>
      <button id="btnHoro">计算运限</button>
    </div>
    <div class="scope-group" id="scopeGroup">
      <button class="small active-scope" data-scope="decadal">大限</button>
      <button class="small" data-scope="yearly">流年</button>
      <button class="small" data-scope="monthly">流月</button>
      <button class="small" data-scope="daily">流日</button>
      <button class="small" data-scope="hourly">流时</button>
    </div>
    <div id="horoInfo"></div>
  </div>

  <!-- 基本信息 -->
  <div id="result" style="display:none;">
    <div class="panel">
      <h2 style="font-size:16px;margin-bottom:8px;">基本信息</h2>
      <table><tbody id="basicInfo"></tbody></table>
    </div>

    <!-- 4x4 星盘 -->
    <div class="panel">
      <h2 style="font-size:16px;margin-bottom:8px;text-align:center;">
        紫微斗数星盘
        <span style="font-size:12px;color:#888;font-weight:400;margin-left:10px;">
          <span class="tag origin">本命星曜</span>
        </span>
      </h2>
      <div id="palacesGrid" class="astro-grid"></div>
    </div>

    <div class="panel">
      <h2 style="font-size:16px;margin-bottom:8px;">运限详情</h2>
      <div id="horoDetail"></div>
    </div>
  </div>
</div>

<script>
let currentAstrolabe = null;
let currentHoroscope = null;
let activeScopes = new Set(['decadal', 'yearly', 'monthly', 'daily', 'hourly']);

const SCOPE_LABELS = { decadal: '大限', yearly: '流年', monthly: '流月', daily: '流日', hourly: '流时' };
const SCOPE_COLORS = { decadal: '#c55a11', yearly: '#2e75b6', monthly: '#548235', daily: '#bf8f00', hourly: '#843c0c' };

// ===== 事件绑定 =====

document.getElementById('btnCalc').addEventListener('click', doCalc);

document.getElementById('scopeGroup').addEventListener('click', e => {
  const btn = e.target.closest('[data-scope]');
  if (!btn) return;
  const scope = btn.dataset.scope;
  if (activeScopes.has(scope)) activeScopes.delete(scope);
  else activeScopes.add(scope);
  btn.classList.toggle('scope-on');
  if (currentHoroscope) render();
});

document.getElementById('btnHoro').addEventListener('click', doHoroscope);

// ===== 核心逻辑 =====

function doCalc() {
  const dateStr = document.getElementById('dateStr').value.trim();
  const timeIndex = parseInt(document.getElementById('timeIndex').value);
  const gender = document.getElementById('gender').value;
  const algorithm = document.getElementById('algorithm').value;

  try {
    currentAstrolabe = iztro.astro.bySolar(dateStr, timeIndex, gender);
    if (algorithm === 'zhongzhou') {
      currentAstrolabe = iztro.astro.withOptions({
        type: 'solar', dateStr, timeIndex, gender,
        config: { algorithm: 'zhongzhou' }, astroType: 'heaven',
      });
    }
    document.getElementById('error').textContent = '';
    document.getElementById('horoPanel').style.display = 'block';
    document.getElementById('result').style.display = 'block';
    renderBasic();
    currentHoroscope = null;
    render();
    // 排盘后默认展示命宫的三方四正
    setTimeout(() => {
      const soul = currentAstrolabe.palace('命宫');
      if (soul) drawSfzzLines(soul.index);
    }, 50);
  } catch (e) {
    document.getElementById('error').textContent = '❌ ' + e.message;
  }
}

function doHoroscope() {
  if (!currentAstrolabe) { alert('请先排盘'); return; }
  const dateStr = document.getElementById('horoDate').value.trim();
  const timeIndex = parseInt(document.getElementById('horoTime').value);
  try {
    currentHoroscope = currentAstrolabe.horoscope(dateStr, timeIndex);
    renderHoroInfo();
    render();
  } catch (e) {
    document.getElementById('error').textContent = '❌ 运限错误: ' + e.message;
  }
}

function renderBasic() {
  if (!currentAstrolabe) return;
  const a = currentAstrolabe;
  const rows = [
    ['阳历', a.solarDate], ['农历', a.lunarDate], ['四柱', a.chineseDate],
    ['时辰', a.time], ['生肖', a.zodiac], ['星座', a.sign],
    ['命宫', a.earthlyBranchOfSoulPalace], ['身宫', a.earthlyBranchOfBodyPalace],
    ['命主', a.soul], ['身主', a.body], ['五行局', a.fiveElementsClass],
  ];
  document.getElementById('basicInfo').innerHTML = rows.map(([k,v]) =>
    `<tr><td style="width:80px;font-weight:600;">${k}</td><td>${v}</td></tr>`
  ).join('');
}

function renderHoroInfo() {
  if (!currentHoroscope) return;
  const h = currentHoroscope;
  document.getElementById('horoInfo').innerHTML = `
    <div style="font-size:13px;color:#555;margin-top:6px;">
      运限基准: ${h.solarDate} (${h.lunarDate})
      · 大限在第 ${h.decadal.index} 宫 · 小限 ${h.age.nominalAge} 岁
      · 流年命宫: ${h.yearly.palaceNames[h.yearly.index]}
    </div>
  `;
}

function render() {
  if (!currentAstrolabe) return;
  const palaces = currentAstrolabe.palaces;
  const grid = document.getElementById('palacesGrid');

  const layout = [
    [3,0], [2,0], [1,0], [0,0],
    [0,1], [0,2], [0,3], [1,3],
    [2,3], [3,3], [3,2], [3,1],
  ];
  const center = new Set(['1,1','1,2','2,1','2,2']);
  const gridMap = {};
  layout.forEach(([r, c], i) => { gridMap[r+','+c] = i; });

  // 星曜分类顺序: 主星 → 辅星(soft+lucun+tianma) → 煞星(tough) → 杂曜(adj+flower+helper)
  const typeOrder = ['major', 'soft', 'lucun', 'tianma', 'tough', 'adjective', 'flower', 'helper'];
  const typeLabels = { major: '主', soft: '辅', lucun: '辅', tianma: '辅', tough: '煞', adjective: '杂', flower: '杂', helper: '杂' };
  const typeColors = { major: '#c0392b', soft: '#27ae60', lucun: '#27ae60', tianma: '#27ae60', tough: '#e67e22', adjective: '#7f8c8d', flower: '#7f8c8d', helper: '#7f8c8d' };

  let html = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const key = r+','+c;
      if (center.has(key)) { html += '<div class="palace-card empty"></div>'; continue; }
      const pi = gridMap[key];
      const p = palaces[pi];
      if (!p) { html += '<div class="palace-card empty"></div>'; continue; }

      // ---- 星曜 ----
      const allStars = [...(p.majorStars||[]), ...(p.minorStars||[]), ...(p.adjectiveStars||[])];
      // 按 typeOrder 排序
      const sorted = [];
      typeOrder.forEach(t => {
        allStars.filter(s => s.type === t).forEach(s => sorted.push(s));
      });

      let starsHtml = '';
      sorted.forEach(s => {
        const typeColor = typeColors[s.type] || '#888';
        starsHtml += `<div class="star-item">
          <div class="sn" style="color:${typeColor};">${s.name}</div>
          ${s.brightness ? `<div class="sb">${s.brightness}</div>` : ''}
          ${s.mutagen ? `<div class="sm">${s.mutagen}</div>` : ''}
        </div>`;
      });
      if (!starsHtml) starsHtml = '<span style="color:#ccc;font-size:8px;">—</span>';

      // ---- 流耀（右侧，从右到左排列） ----
      const scopeOrder = ['decadal', 'yearly', 'monthly', 'daily', 'hourly'];
      let transitHtml = '';
      if (currentHoroscope) {
        const items = [];
        for (const scope of scopeOrder) {
          if (!activeScopes.has(scope)) continue;
          const scopeItem = currentHoroscope[scope];
          if (!scopeItem || !scopeItem.stars || !scopeItem.stars[pi]) continue;
          scopeItem.stars[pi].forEach(s => {
            items.push({ scope, name: s.name });
          });
        }
        transitHtml = items.map(({ scope, name }) =>
          `<span class="ts-item ts-${scope}">${name}</span>`
        ).join('');
      }

      // ---- 大限 ----
      const dec = p.decadal;
      const decadalHtml = dec ? `${dec.range[0]}-${dec.range[1]}岁` : '';

      // ---- 神煞 ----
      const des = [];
      if (p.boshi12) des.push(`<span style="color:#66bb6a;">${p.boshi12}</span>`);
      if (p.jiangqian12) des.push(p.jiangqian12);
      if (p.suiqian12) des.push(p.suiqian12);

      // ---- 天干地支 ----
      const stemBranch = p.heavenlyStem + p.earthlyBranch;
      const cs12 = p.changsheng12 || '';

      html += `<div class="palace-card" data-pi="${pi}">
        <div class="stars-area">${starsHtml}</div>
        ${transitHtml ? `<div class="transit-area">${transitHtml}</div>` : ''}
        <div class="decadal-area">${decadalHtml}</div>
        <div class="deities-area">${des.join('<br>')}</div>
        <div class="name-area">${p.name}</div>
        <div class="stem-area">${cs12 ? `<span class="cs12">${cs12}</span>` : ''}<span class="sb-text">${stemBranch}</span></div>
        ${p.isBodyPalace && !currentHoroscope ? '<div class="body-mark">身宫</div>' : ''}
      </div>`;
    }
  }
  grid.innerHTML = html;
  // 将 SVG 连线层追加到 grid 内部（innerHTML 会清除之前的 SVG）
  let svg = document.getElementById('sfzz-svg');
  if (!svg) {
    svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.id = 'sfzz-svg';
    grid.appendChild(svg);
  }
  if (_lastSfzzPi !== null) drawSfzzLines(_lastSfzzPi);
}

// ===== 三方四正交互 =====
// layout 中每个 palaceIndex 对应的 grid 坐标 (row, col)
const SFZZ_LAYOUT = [
  [3,0], [2,0], [1,0], [0,0],
  [0,1], [0,2], [0,3], [1,3],
  [2,3], [3,3], [3,2], [3,1],
];

function getSfzzIndices(targetPi) {
  return [
    targetPi,                    // 本宫
    (targetPi + 6) % 12,         // 对宫
    (targetPi + 4) % 12,         // 财帛位（三合）
    (targetPi + 8) % 12,         // 官禄位（三合）
  ];
}

function getConnectionPoint(pi) {
  const grid = document.getElementById('palacesGrid');
  const rect = grid.getBoundingClientRect();
  const [r, c] = SFZZ_LAYOUT[pi];
  const w = rect.width / 4;
  const h = rect.height / 4;

  // 四角：连接点在对角内侧
  if (r === 0 && c === 0) return { x: (c + 1) * w, y: (r + 1) * h }; // 巳(右上)→左下角
  if (r === 0 && c === 3) return { x: c * w, y: (r + 1) * h };       // 申(左上)→右下角
  if (r === 3 && c === 3) return { x: c * w, y: r * h };             // 亥(左下)→右上角
  if (r === 3 && c === 0) return { x: (c + 1) * w, y: r * h };       // 寅(右下)→左上角

  // 上边非角：连接点在下边中心
  if (r === 0) return { x: (c + 0.5) * w, y: (r + 1) * h };
  // 右边非角：连接点在左边中心
  if (c === 3) return { x: c * w, y: (r + 0.5) * h };
  // 下边非角：连接点在上边中心
  if (r === 3) return { x: (c + 0.5) * w, y: r * h };
  // 左边非角：连接点在右边中心
  if (c === 0) return { x: (c + 1) * w, y: (r + 0.5) * h };

  return { x: (c + 0.5) * w, y: (r + 0.5) * h };
}

document.getElementById('palacesGrid').addEventListener('click', e => {
  const card = e.target.closest('.palace-card[data-pi]');
  if (!card) return;
  const pi = parseInt(card.dataset.pi);
  const indices = getSfzzIndices(pi);

  clearSfzz();

  // 只画连线，不高亮宫位
  drawSfzzLines(pi);
});

// 点击外部可清除高亮
document.addEventListener('click', e => {
  if (!e.target.closest('.astro-grid')) clearSfzz();
});

function renderHoroDetail() {
  const el = document.getElementById('horoDetail');
  if (!currentHoroscope) {
    el.innerHTML = '<div style="color:#888;font-size:13px;">请先点击"计算运限"</div>';
    return;
  }

  const h = currentHoroscope;
  const scopes = [
    { key: 'decadal', label: '大限' },
    { key: 'yearly', label: '流年' },
    { key: 'monthly', label: '流月' },
    { key: 'daily', label: '流日' },
    { key: 'hourly', label: '流时' },
  ];

  el.innerHTML = '<div class="horo-grid">' + scopes.map(s => {
    const item = h[s.key];
    if (!item) return '';
    const color = SCOPE_COLORS[s.key];
    const isOn = activeScopes.has(s.key);
    const starsHtml = item.stars ? item.stars.map((arr,i) =>
      arr.map(st => st.name).join(', ')
    ).filter(Boolean).join(' | ') : '(无流耀)';
    return `<div class="horo-card hc-${s.key}" style="${isOn ? 'background:#fff8e1;' : 'opacity:0.6;'}">
      <div class="horo-label">${s.label} ${isOn ? '✓' : ''}</div>
      <div class="horo-value" style="color:${color};">${item.palaceNames ? item.palaceNames[item.index] || '—' : '—'}</div>
      <div style="font-size:11px;color:#666;margin-top:2px;">
        天干 ${item.heavenlyStem} · 地支 ${item.earthlyBranch}
        ${item.nominalAge !== undefined ? `· 虚岁 ${item.nominalAge}` : ''}
      </div>
      <div style="font-size:11px;color:${color};margin-top:2px;">
        流耀: ${starsHtml}
      </div>
    </div>`;
  }).join('') + '</div>';
}

// 回车键触发
document.getElementById('dateStr').addEventListener('keydown', e => { if (e.key === 'Enter') doCalc(); });
document.getElementById('horoDate').addEventListener('keydown', e => { if (e.key === 'Enter') doHoroscope(); });

// 初始化所有 scope 按钮为选中状态
document.querySelectorAll('#scopeGroup [data-scope]').forEach(btn => btn.classList.add('scope-on'));

// 自动排盘
doCalc();

// 窗口 resize 时重绘连线
let _lastSfzzPi = null;

function clearSfzz() {
  _lastSfzzPi = null;
  const svg = document.getElementById('sfzz-svg');
  if (svg) svg.innerHTML = '';
}

function drawSfzzLines(pi) {
  _lastSfzzPi = pi;
  const svg = document.getElementById('sfzz-svg');
  const grid = document.getElementById('palacesGrid');
  const rect = grid.getBoundingClientRect();
  svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);

  const indices = getSfzzIndices(pi);
  const points = indices.map(i => getConnectionPoint(i));

  svg.innerHTML = '';

  const connections = [[0, 2], [2, 3], [0, 3], [0, 1]];
  connections.forEach(([from, to]) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', points[from].x);
    line.setAttribute('y1', points[from].y);
    line.setAttribute('x2', points[to].x);
    line.setAttribute('y2', points[to].y);
    line.setAttribute('stroke', '#e67e22');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '5,3');
    line.setAttribute('stroke-opacity', '0.7');
    svg.appendChild(line);
  });
}

window.addEventListener('resize', () => {
  if (_lastSfzzPi !== null) drawSfzzLines(_lastSfzzPi);
});
</script>
</body>
</html>
